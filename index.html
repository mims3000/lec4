<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Lightbox Photo Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link href="dist/css/lightbox.css" rel="stylesheet">
</head>
<body>
    <header>
        <h1>My Lightbox Photo Gallery</h1>
    </header>

    <main>
        <div class="grid"> 
            <a href="images/bray_rocks.png" data-lightbox="nature">
                <img src="images/bray_rocks.png" width ="200" alt="Handful of rocks in Bray">
            </a>

            <a href="images/butterfly_seat.JPG" data-lightbox="tourist_attractions">
                <img src="images/butterfly_seat.JPG" width ="200" alt="Camila sitting on butterfly chair">
            </a>

            <a href="images/temple_bar.JPG" data-lightbox="tourist_attractions">
                <img src="images/temple_bar.JPG" width ="200" alt="Outside Temple Bar">
            </a>

            <a href="images/wicklow_cliffside_peace.JPG" data-lightbox="nature">
                <img src="images/wicklow_cliffside_peace.JPG" width ="200" alt="Camila on a Wicklow cliffside">
            </a>
        </div>
    </main>
    <script src="dist/js/lightbox-plus-jquery.js"></script>
</body>
</html>
